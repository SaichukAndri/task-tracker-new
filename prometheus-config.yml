cat > prometheus-simple-config.yml << EOF
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    scrape_configs:
      - job_name: 'prometheus'
        static_configs:
          - targets: ['localhost:9090']

      # Спрощена конфігурація для бекенду
      - job_name: 'backend-simple'
        kubernetes_sd_configs:
          - role: endpoints
            namespaces:
              names:
                - default
        relabel_configs:
          - source_labels: [__meta_kubernetes_service_name]
            regex: backend-service
            action: keep
          - source_labels: [__meta_kubernetes_service_port_name]
            regex: metrics
            action: keep

      # Пряма статична конфігурація
      - job_name: 'backend-direct'
        metrics_path: /metrics
        static_configs:
          - targets: ['backend-service:3000']
EOF

kubectl apply -f prometheus-simple-config.yml
kubectl rollout restart deployment prometheus-deployment